services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: creditunder
      POSTGRES_PASSWORD: creditunder
      POSTGRES_DB: creditunder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creditunder"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.1.1
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 512M
      - --mode dev-container
      - --default-log-level=warn
    ports:
      - "19092:19092"
      - "18082:18082"
      - "18081:18081"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  redpanda-init:
    image: redpandadata/redpanda:v24.1.1
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        rpk topic create credit-applications --brokers redpanda:9092 --partitions 4 --replicas 1
        echo "Topic created."

  dms:
    build:
      context: .
      dockerfile: mockups/dms/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DMS_PORT=8001

  edw:
    build:
      context: .
      dockerfile: mockups/edw/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - EDW_PORT=8002

volumes:
  postgres_data:
