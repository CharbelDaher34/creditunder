services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: creditunder
      POSTGRES_PASSWORD: creditunder
      POSTGRES_DB: creditunder
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creditunder"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.2
    environment:
      - CLUSTER_ID=5L6g3nShT-eMCtK--X86sw
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-19092}
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    ports:
      - "${KAFKA_EXTERNAL_PORT:-19092}:19092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: apache/kafka:3.7.2
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
          --bootstrap-server kafka:9092 \
          --topic credit-applications \
          --partitions 4 \
          --replication-factor 1
        echo "Topic created."

  dms:
    build:
      context: .
      dockerfile: mockups/dms/Dockerfile
    ports:
      - "${DMS_PORT:-8001}:8001"
    environment:
      - DMS_PORT=8001
    volumes:
      - dms_data:/data

  edw:
    build:
      context: .
      dockerfile: mockups/edw/Dockerfile
    ports:
      - "${EDW_PORT:-8002}:8002"
    environment:
      - EDW_PORT=8002

  crm:
    build:
      context: .
      dockerfile: mockups/crm/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "${CRM_PORT:-8003}:8003"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=credit-applications
      - CRM_PORT=8003

  processor:
    build:
      context: .
      dockerfile: src/creditunder/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      dms:
        condition: service_started
      edw:
        condition: service_started
    env_file:
      - .env
    environment:
      # Inside Docker, connect to services via their service names on internal ports
      - DATABASE_URL=postgresql+asyncpg://creditunder:creditunder@postgres:5432/creditunder
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DMS_BASE_URL=http://dms:8001
      - EDW_BASE_URL=http://edw:8002
    volumes:
      - processor_logs:/logs
    restart: on-failure

  workbench_api:
    build:
      context: .
      dockerfile: src/creditunder/workbench.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      crm:
        condition: service_started
      dms:
        condition: service_started
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://creditunder:creditunder@postgres:5432/creditunder
      - CRM_BASE_URL=http://crm:8003
      - DMS_BASE_URL=http://dms:8001
    volumes:
      - processor_logs:/logs
    ports:
      - "${WORKBENCH_API_PORT:-8004}:8004"
    restart: on-failure

  workbench_ui:
    build:
      context: src/workbench-ui
      dockerfile: Dockerfile
    depends_on:
      - workbench_api
    ports:
      - "${WORKBENCH_UI_PORT:-8081}:80"
    restart: on-failure

volumes:
  postgres_data:
  dms_data:
  processor_logs:

